# mkdocs.yml
site_url: https://wHkr.github.io/Bakeology/
site_name: Bakeology
nav:
  - Home: index.md
  - About: about.md
  - Cakes: cakes.md
  - Pastries: pastries.md
  - Breads: breads.md
  - Gallery: gallery.md
  - Contact: contact.md
theme:
  name: material
  favicon: img/icons/bakeology.jpg # No leading '/'
  logo: img/icons/logo.png # '/'; indicates to start from root
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
extra_css:
  - stylesheets/extra.css