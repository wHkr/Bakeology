# mkdocs.yml
site_url: https://wHkr.github.io/Bakeology/
site_name: Bakeology
nav:
  - Home: index.md
  - About: about.md
  - Cakes: cakes.md
  - Pastries: pastries.md
  - Breads: breads.md
  - Gallery: gallery.md
  - Contact: contact.md
theme:
  name: material
  palette:
    # Dark Mode
    - scheme: slate
      primary: teal
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: Dark mode
    # Light Mode
    - scheme: default
      primary: grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Light mode
  favicon: img/icons/bakeology.jpg # No leading '/'
  logo: img/icons/logo.png # '/'; indicates to start from root
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
extra_javascript:
  - javascripts/extra.js
extra_css:
  - stylesheets/extra.css